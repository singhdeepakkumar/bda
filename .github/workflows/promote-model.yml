name: Promote Model and Trigger App Deployment

on:
  push:
    branches:
      - "release/**" # Triggers automatically when release branches are updated
  workflow_dispatch:
    inputs:
      model_version:
        description: "Optional: specify model version to promote"
        required: false

env:
  MLFLOW_TRACKING_URI: https://dagshub.com/singhdeepakkumar/my-bda-repo.mlflow
  MODEL_NAME: DecisionTreeTelecomCustomerChurnModel

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install MLflow
        run: pip install mlflow

      - name: Promote model to Production
        id: promote
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.model_version }}
        run: |
          python <<EOF
          import os
          from mlflow.tracking import MlflowClient
          mlflow.set_tracking_uri("${{ env.MLFLOW_TRACKING_URI }}")
          client = MlflowClient()
          model_name = "${{ env.MODEL_NAME }}"
          version = os.getenv("INPUT_VERSION")

          if version:
              print(f"Promoting specified model version: {version}")
          else:
              print("No version specified, selecting latest available...")
              versions = client.get_latest_versions(model_name, stages=["None", "Staging"])
              if not versions:
                  print("No candidate model version to promote.")
                  exit(1)
              version = versions[0].version
              print(f"Selected latest model version: {version}")

          client.transition_model_version_stage(
              name=model_name,
              version=version,
              stage="Production",
              archive_existing_versions=True
          )
          with open(os.environ['GITHUB_ENV'], "a") as f:
              f.write(f"PROMOTED_VERSION={version}\n")
          print(f"🚀 Model version {version} promoted to Production.")
          EOF

      - name: Trigger deployment in app repo
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          repository: singhdeepakkumar/bda-app
          event-type: deploy-app-model
          client-payload: '{"model_version": "${{ env.PROMOTED_VERSION }}"}'
