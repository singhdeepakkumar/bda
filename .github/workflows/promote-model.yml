name: Promote Model and Trigger App Deployment

on:
  push:
    branches:
      - "release/**" # Triggers automatically when release branches are updated
  workflow_dispatch:
    inputs:
      model_version:
        description: "Optional: specify model version to promote"
        required: false

env:
  MLFLOW_TRACKING_URI: https://dagshub.com/singhdeepakkumar/my-bda-repo.mlflow
  MODEL_NAME: DecisionTreeTelecomCustomerChurnModel
  MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
  INPUT_VERSION: ${{ github.event.inputs.model_version || ''}}

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install MLflow
        run: pip install mlflow

      - name: Promote model to Production
        id: promote
        run: |
          python <<EOF
          import os
          import mlflow
          from mlflow.tracking import MlflowClient
          mlflow.set_tracking_uri("${{ env.MLFLOW_TRACKING_URI }}")
          client = MlflowClient()
          model_name = "${{ env.MODEL_NAME }}"
          user_version = os.getenv("INPUT_VERSION")

          if user_version:
              version_to_promote = user_version
              print(f"Using user-specified model version: {version_to_promote}")
          else:
              all_versions = client.search_model_versions(f"name='{model_name}'")              
              version_to_promote = sorted(all_versions, key=lambda v: int(v.version))[-1].version
              print(f"Promoting latest model version: {version_to_promote}")

          client.set_registered_model_alias(model_name, "production", version_to_promote)
          with open(os.environ['GITHUB_ENV'], "a") as f:
              f.write(f"PROMOTED_VERSION={version}\n")
          print(f"Model version {version} promoted to Production.")
          promoted = client.get_model_version(name=model_name, version=version)
          print(f"Model version {version} is now in stage: {promoted.current_stage}")
          EOF

      - name: Trigger deployment in app repo
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: singhdeepakkumar/bda-app
          event-type: deploy-app-model
          client-payload: '{"model_version": "${{ env.PROMOTED_VERSION }}"}'
